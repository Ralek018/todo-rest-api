services:
  db:
    image: postgres:17
    container_name: todo-postgres
    environment:
      POSTGRES_DB: todo_db
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devuser
    ports:
      - "5433:5432"
    volumes:
      - todo-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devuser -d todo_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: todo-api
    environment:
      PSQL_USERNAME: devuser
      PSQL_PASSWORD: devuser
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/todo_db
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  todo-pgdata: